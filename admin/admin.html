<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christ Connect — Admin Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #070D1C; color: #E2E8F0; min-height: 100vh; }
  .header { background: #0C1629; border-bottom: 1px solid #ffffff18;
    padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #F4A623; }
  .header span { font-size: 12px; color: #7B8FA6; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px; }
  .card { background: #101E35; border: 1px solid #ffffff18;
    border-radius: 16px; padding: 24px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px;
    color: #F4A623; display: flex; align-items: center; gap: 8px; }
  label { display: block; font-size: 11px; font-weight: 600;
    color: #94A3B8; letter-spacing: 0.5px; margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; padding: 10px 14px; background: #070D1C;
    border: 1px solid #ffffff22; border-radius: 10px;
    color: #E2E8F0; font-size: 14px; margin-bottom: 14px;
    outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: #F4A623; }
  input[type="file"] { padding: 8px; cursor: pointer; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn { padding: 12px 20px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .btn-gold { background: #F4A623; color: #000; width: 100%; }
  .btn-gold:hover { background: #e09010; }
  .btn-gold:disabled { background: #555; color: #999; cursor: not-allowed; }
  .btn-red { background: #E24B4A22; color: #E24B4A;
    border: 1px solid #E24B4A44; font-size: 12px; padding: 6px 12px; }
  .progress { background: #ffffff18; border-radius: 4px; height: 6px;
    margin: 10px 0; overflow: hidden; display: none; }
  .progress-bar { height: 100%; background: #F4A623;
    border-radius: 4px; transition: width 0.3s; width: 0%; }
  .msg { padding: 10px 14px; border-radius: 10px; font-size: 13px;
    margin-top: 10px; display: none; }
  .msg.ok  { background: #10B98122; color: #10B981; border: 1px solid #10B98133; }
  .msg.err { background: #E24B4A22; color: #E24B4A; border: 1px solid #E24B4A33; }
  .songs-list { margin-top: 16px; }
  .song-item { background: #162540; border: 1px solid #ffffff15;
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px; }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-size: 14px; font-weight: 600; margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-meta { font-size: 11px; color: #7B8FA6; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 700; margin-right: 6px; }
  .badge-te { background: #F4A62322; color: #F4A623; }
  .badge-en { background: #2B5CE622; color: #2B5CE6; }
  .badge-hy { background: #10B98122; color: #10B981; }
  .bulk-drop { border: 2px dashed #ffffff33; border-radius: 12px;
    padding: 30px; text-align: center; cursor: pointer; transition: 0.2s; }
  .bulk-drop:hover, .bulk-drop.drag { border-color: #F4A623;
    background: #F4A62308; }
  .bulk-files { margin-top: 12px; max-height: 200px; overflow-y: auto; }
  .bulk-file { padding: 8px 12px; background: #0C1629;
    border-radius: 8px; margin-bottom: 6px; font-size: 12px;
    display: flex; justify-content: space-between; align-items: center; }
  .tab-btns { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #ffffff22;
    background: transparent; color: #7B8FA6; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: 0.2s; }
  .tab-btn.active { background: #F4A623; color: #000; border-color: #F4A623; }
  .loading { display: none; width: 18px; height: 18px;
    border: 2px solid #ffffff33; border-top-color: #000;
    border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>✝️ Christ Connect Admin</h1>
    <span id="statusText">Loading Firebase...</span>
  </div>
</div>

<div class="container">
  <!-- Tabs -->
  <div class="tab-btns">
    <button class="tab-btn active" onclick="showTab('upload')">📤 Upload Song</button>
    <button class="tab-btn" onclick="showTab('bulk')">📦 Bulk Upload</button>
    <button class="tab-btn" onclick="showTab('manage')">🎵 Manage Songs</button>
  </div>

  <!-- ── Tab: Single Upload ── -->
  <div id="tab-upload">
    <div class="card">
      <h2>📤 Upload Single Song</h2>
      <div class="row">
        <div>
          <label>SONG TITLE *</label>
          <input type="text" id="title" placeholder="Song name...">
        </div>
        <div>
          <label>ARTIST / SINGER *</label>
          <input type="text" id="artist" placeholder="Artist name...">
        </div>
      </div>
      <div class="row">
        <div>
          <label>CATEGORY</label>
          <select id="category">
            <option value="telugu">Telugu Worship</option>
            <option value="english">English Worship</option>
            <option value="hymn">Hymn</option>
          </select>
        </div>
        <div>
          <label>MP3 FILE *</label>
          <input type="file" id="mp3File" accept="audio/mpeg,audio/mp3,.mp3">
        </div>
      </div>
      <div class="progress" id="singleProgress">
        <div class="progress-bar" id="singleBar"></div>
      </div>
      <button class="btn btn-gold" id="uploadBtn" onclick="uploadSingle()">
        <span id="uploadText">Upload Song</span>
        <div class="loading" id="uploadLoading"></div>
      </button>
      <div class="msg" id="singleMsg"></div>
    </div>
  </div>

  <!-- ── Tab: Bulk Upload ── -->
  <div id="tab-bulk" style="display:none">
    <div class="card">
      <h2>📦 Bulk Upload Songs</h2>
      <label>CATEGORY FOR ALL FILES</label>
      <select id="bulkCategory">
        <option value="telugu">Telugu Worship</option>
        <option value="english">English Worship</option>
        <option value="hymn">Hymn</option>
      </select>
      <label>SELECT MULTIPLE MP3 FILES</label>
      <div class="bulk-drop" id="bulkDrop" onclick="document.getElementById('bulkFiles').click()">
        <div style="font-size:32px;margin-bottom:8px">🎵</div>
        <div style="font-size:14px;color:#94A3B8">Click or drag & drop MP3 files here</div>
        <div style="font-size:11px;color:#7B8FA6;margin-top:4px">Multiple files supported</div>
      </div>
      <input type="file" id="bulkFiles" accept=".mp3,audio/mpeg" multiple style="display:none"
        onchange="handleBulkFiles(this.files)">
      <div class="bulk-files" id="bulkFilesList"></div>
      <div class="progress" id="bulkProgress">
        <div class="progress-bar" id="bulkBar"></div>
      </div>
      <div id="bulkStatus" style="font-size:12px;color:#94A3B8;margin:8px 0;"></div>
      <button class="btn btn-gold" id="bulkBtn" onclick="uploadBulk()" style="display:none">
        Upload All Songs
      </button>
      <div class="msg" id="bulkMsg"></div>
    </div>
  </div>

  <!-- ── Tab: Manage ── -->
  <div id="tab-manage" style="display:none">
    <div class="card">
      <h2>🎵 All Songs</h2>
      <div id="songsList">
        <div style="text-align:center;padding:30px;color:#7B8FA6">Loading songs...</div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase v9 CDN -->
<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getStorage, ref, uploadBytesResumable, getDownloadURL }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

// ── YOUR FIREBASE CONFIG ────────────────────────────────────────────────
// Replace with your actual Firebase config from Firebase Console
// Project Settings → Your apps → SDK setup → Config
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
// ────────────────────────────────────────────────────────────────────────

const app     = initializeApp(firebaseConfig);
const db      = getFirestore(app);
const storage = getStorage(app);

document.getElementById('statusText').textContent = '✅ Firebase connected';

// ── Upload single song ────────────────────────────────────────────────
window.uploadSingle = async function() {
  const title    = document.getElementById('title').value.trim();
  const artist   = document.getElementById('artist').value.trim();
  const category = document.getElementById('category').value;
  const file     = document.getElementById('mp3File').files[0];

  if (!title)  return showMsg('singleMsg', 'Enter song title', 'err');
  if (!artist) return showMsg('singleMsg', 'Enter artist name', 'err');
  if (!file)   return showMsg('singleMsg', 'Select MP3 file', 'err');

  setLoading('uploadBtn', 'uploadText', 'uploadLoading', true);
  showProgress('singleProgress');

  try {
    const url = await uploadFile(file, `songs/${Date.now()}_${file.name}`,
        p => setBar('singleBar', p));
    await addDoc(collection(db, 'songs'), {
      title, artist, category,
      mp3Url:      url,
      coverUrl:    '',
      durationSecs: 0,
      createdAt:   serverTimestamp(),
    });
    showMsg('singleMsg', `✅ "${title}" uploaded!`, 'ok');
    document.getElementById('title').value  = '';
    document.getElementById('artist').value = '';
    document.getElementById('mp3File').value = '';
  } catch(e) {
    showMsg('singleMsg', '❌ Upload failed: ' + e.message, 'err');
  }
  setLoading('uploadBtn', 'uploadText', 'uploadLoading', false);
};

// ── Bulk upload ────────────────────────────────────────────────────────
let bulkFilesList = [];

window.handleBulkFiles = function(files) {
  bulkFilesList = Array.from(files);
  const list = document.getElementById('bulkFilesList');
  list.innerHTML = bulkFilesList.map((f, i) => `
    <div class="bulk-file">
      <span>🎵 ${f.name.replace('.mp3','').replace(/_/g,' ')}</span>
      <span style="color:#7B8FA6;font-size:11px">${(f.size/1024/1024).toFixed(1)} MB</span>
    </div>`).join('');
  document.getElementById('bulkBtn').style.display =
      bulkFilesList.length > 0 ? 'block' : 'none';
  document.getElementById('bulkStatus').textContent =
      `${bulkFilesList.length} files selected`;
};

window.uploadBulk = async function() {
  if (bulkFilesList.length === 0) return;
  const category = document.getElementById('bulkCategory').value;
  showProgress('bulkProgress');
  let done = 0;

  for (const file of bulkFilesList) {
    const name = file.name.replace('.mp3','').replace(/_/g,' ');
    document.getElementById('bulkStatus').textContent =
        `Uploading ${done+1}/${bulkFilesList.length}: ${name}`;
    try {
      const url = await uploadFile(file, `songs/${Date.now()}_${file.name}`,
          p => setBar('bulkBar', (done / bulkFilesList.length + p / bulkFilesList.length / 100) * 100));
      await addDoc(collection(db, 'songs'), {
        title:    name,
        artist:   'Unknown',
        category, mp3Url: url,
        coverUrl: '', durationSecs: 0,
        createdAt: serverTimestamp(),
      });
      done++;
    } catch(e) {
      console.error('Failed:', file.name, e);
    }
  }
  setBar('bulkBar', 100);
  document.getElementById('bulkStatus').textContent = '';
  showMsg('bulkMsg', `✅ ${done}/${bulkFilesList.length} songs uploaded!`, 'ok');
  bulkFilesList = [];
  document.getElementById('bulkFilesList').innerHTML = '';
  document.getElementById('bulkBtn').style.display = 'none';
};

// ── Load songs ─────────────────────────────────────────────────────────
window.loadSongs = async function() {
  const snap  = await getDocs(collection(db, 'songs'));
  const songs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  const list  = document.getElementById('songsList');
  if (songs.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:#7B8FA6">No songs yet. Upload some!</div>';
    return;
  }
  const badgeCls = {'telugu':'badge-te','english':'badge-en','hymn':'badge-hy'};
  list.innerHTML = songs.map(s => `
    <div class="song-item">
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-meta">
          <span class="badge ${badgeCls[s.category]||'badge-te'}">${s.category}</span>
          ${s.artist}
        </div>
      </div>
      <button class="btn btn-red" onclick="deleteSong('${s.id}','${s.title}')">🗑 Delete</button>
    </div>`).join('');
};

window.deleteSong = async function(id, title) {
  if (!confirm(`Delete "${title}"?`)) return;
  await deleteDoc(doc(db, 'songs', id));
  loadSongs();
};

// ── Helpers ───────────────────────────────────────────────────────────
function uploadFile(file, path, onProgress) {
  return new Promise((res, rej) => {
    const storageRef = ref(storage, path);
    const task       = uploadBytesResumable(storageRef, file);
    task.on('state_changed',
      snap => onProgress(snap.bytesTransferred / snap.totalBytes * 100),
      rej,
      () => getDownloadURL(task.snapshot.ref).then(res)
    );
  });
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className   = `msg ${type}`;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function showProgress(id) {
  document.getElementById(id).style.display = 'block';
}

function setBar(id, pct) {
  document.getElementById(id).style.width = pct + '%';
}

function setLoading(btnId, txtId, loadId, on) {
  document.getElementById(btnId).disabled = on;
  document.getElementById(txtId).style.display = on ? 'none' : 'inline';
  document.getElementById(loadId).style.display = on ? 'inline-block' : 'none';
}

window.showTab = function(tab) {
  ['upload','bulk','manage'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['upload','bulk','manage'][i] === tab);
  });
  if (tab === 'manage') loadSongs();
};

// Drag & Drop
const dropZone = document.getElementById('bulkDrop');
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  window.handleBulkFiles(e.dataTransfer.files);
});
</script>
</body>
</html>
